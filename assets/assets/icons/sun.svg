<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon glow -->
    <filter id="neon-glow-sun" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" in="SourceGraphic" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for hot neon -->
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD966"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF4D4D"/>
    </linearGradient>
  </defs>

  <!-- Optional dark background -->
  <rect width="100%" height="100%" fill="#0b0f1a"/>

  <!-- Sun core -->
  <circle cx="128" cy="128" r="40" fill="none" stroke="url(#sun-grad)" stroke-width="8" filter="url(#neon-glow-sun)"/>

  <!-- Rays -->
  <g stroke="url(#sun-grad)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow-sun)">
    <!-- 12 rays -->
    <line x1="128" y1="20" x2="128" y2="56"/>
    <line x1="128" y1="200" x2="128" y2="236"/>
    <line x1="20" y1="128" x2="56" y2="128"/>
    <line x1="200" y1="128" x2="236" y2="128"/>

    <line x1="56" y1="56" x2="84" y2="84"/>
    <line x1="172" y1="172" x2="200" y2="200"/>
    <line x1="56" y1="200" x2="84" y2="172"/>
    <line x1="172" y1="84" x2="200" y2="56"/>

    <line x1="92" y1="28" x2="104" y2="62"/>
    <line x1="28" y1="92" x2="62" y2="104"/>
    <line x1="152" y1="194" x2="164" y2="228"/>
    <line x1="194" y1="152" x2="228" y2="164"/>
  </g>
</svg>